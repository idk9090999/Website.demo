<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acts Project</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'IM Fell English', serif;
      padding: 2rem 1rem;
    }

    h1 {
      font-family: 'Cinzel', serif;
      color: #1a1a1a;
      font-size: clamp(1.2rem, 3vw, 2rem);
      letter-spacing: 0.12em;
      text-align: center;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }

    .board-wrap {
      width: min(640px, 98vw);
      aspect-ratio: 1;
      position: relative;
    }

    .board {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 80px repeat(9, 1fr) 80px;
      grid-template-rows: 80px repeat(9, 1fr) 80px;
      border: 2px solid #333;
      background: #fff;
      gap: 0;
    }

    .space {
      border: 0.5px solid #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 6.5px;
      font-family: 'Cinzel', serif;
      font-weight: 400;
      color: #111;
      cursor: default;
      position: relative;
      padding: 3px 2px 2px;
      line-height: 1.25;
      background: #ffffff;
      overflow: visible;
      margin: 0;
    }

    .space:hover {
      z-index: 50;
      background: #f5f5f5;
    }

    .space .name {
      font-size: 6px;
      line-height: 1.2;
    }

    /* Color bars — top for bottom row, bottom for top row, sides for left/right */
    .color-bar {
      background: #ccc;
      flex-shrink: 0;
    }
    .bottom .color-bar { width: 100%; height: 12px; order: -1; }
    .top    .color-bar { width: 100%; height: 12px; order: 1; }
    .left   .color-bar { height: 100%; width: 12px; order: 1; }
    .right  .color-bar { height: 100%; width: 12px; order: -1; }

    .left, .right {
      flex-direction: row;
      padding: 2px;
    }
    .left .name, .right .name { font-size: 5.5px; line-height: 1.3; }

    /* Corner spaces */
    .corner {
      background: #ffffff;
      font-size: 7.5px;
      font-family: 'Cinzel', serif;
      font-weight: 700;
    }

    /* Special space types */
    .tax     { background: #ffffff; }
    .railroad{ background: #ffffff; }
    .utility { background: #ffffff; }
    .chance  { background: #ffffff; }
    .chest   { background: #ffffff; }
    .go-jail { background: #ffffff; }
    .jail-corner { background: #ffffff; }

    /* Tooltip */
    .tip {
      display: none;
      position: absolute;
      background: #fffdf4;
      border: 1.5px solid #c8a84b;
      border-radius: 4px;
      padding: 8px 10px;
      font-family: 'IM Fell English', serif;
      font-size: 11px;
      color: #1a1a0f;
      line-height: 1.55;
      width: 195px;
      z-index: 200;
      pointer-events: none;
      white-space: normal;
      box-shadow: 2px 4px 12px rgba(0,0,0,0.18);
    }
    .space:hover .tip { display: block; }

    .bottom .tip { bottom: 100%; left: 50%; transform: translateX(-50%); margin-bottom: 5px; }
    .top    .tip { top: 100%;    left: 50%; transform: translateX(-50%); margin-top: 5px; }
    .left   .tip { left: 100%;  top: 50%;  transform: translateY(-50%); margin-left: 5px; }
    .right  .tip { right: 100%; top: 50%;  transform: translateY(-50%); margin-right: 5px; }
    .corner .tip { bottom: 100%; left: 50%; transform: translateX(-50%); margin-bottom: 5px; }

    /* Center */
    .center {
      grid-column: 2 / 11;
      grid-row: 2 / 11;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    footer {
      margin-top: 1.5rem;
      font-family: 'IM Fell English', serif;
      font-style: italic;
      color: #666;
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>Acts Project</h1>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<footer>Hover over any space to reveal its Bible verse</footer>

<script>
const spaces = [
  { name: "GO", type: "corner", verse: "Genesis 12:1 — 'Go from your country and your kindred... to the land I will show you.'" },
  { name: "Mediterranean Ave", type: "prop", color: "#8B4513" },
  { name: "Community Chest", type: "chest", verse: "Acts 2:44-45 — 'All who believed were together and had all things in common... distributing the proceeds to all, as any had need.'" },
  { name: "Baltic Ave", type: "prop", color: "#8B4513" },
  { name: "Income Tax", type: "tax", verse: "Matthew 22:21 — 'Render to Caesar the things that are Caesar's, and to God the things that are God's.'" },
  { name: "Reading Railroad", type: "railroad", verse: "Isaiah 40:31 — 'They shall run and not be weary; they shall walk and not faint.'" },
  { name: "Oriental Ave", type: "prop", color: "#87CEEB" },
  { name: "Chance", type: "chance", verse: "Proverbs 16:33 — 'The lot is cast into the lap, but its every decision is from the Lord.'" },
  { name: "Vermont Ave", type: "prop", color: "#87CEEB" },
  { name: "Connecticut Ave", type: "prop", color: "#87CEEB" },
  { name: "Jail / Just Visiting", type: "jail-corner", verse: "Matthew 25:36 — 'I was in prison and you came to me.'" },
  { name: "St. Charles Place", type: "prop", color: "#FF69B4" },
  { name: "Electric Company", type: "utility", verse: "John 8:12 — 'I am the light of the world. Whoever follows me will not walk in darkness.'" },
  { name: "States Ave", type: "prop", color: "#FF69B4" },
  { name: "Virginia Ave", type: "prop", color: "#FF69B4" },
  { name: "Pennsylvania Railroad", type: "railroad", verse: "Philippians 3:14 — 'I press on toward the goal for the prize of the upward call of God in Christ Jesus.'" },
  { name: "St. James Place", type: "prop", color: "#FFA500" },
  { name: "Community Chest", type: "chest", verse: "2 Corinthians 9:7 — 'God loves a cheerful giver.'" },
  { name: "Tennessee Ave", type: "prop", color: "#FFA500" },
  { name: "New York Ave", type: "prop", color: "#FFA500" },
  { name: "Free Parking", type: "corner", verse: "Matthew 11:28 — 'Come to me, all who labor and are heavy laden, and I will give you rest.'" },
  { name: "Kentucky Ave", type: "prop", color: "#e02020" },
  { name: "Chance", type: "chance", verse: "Jeremiah 29:11 — 'I know the plans I have for you... plans for welfare and not for evil, to give you a future and a hope.'" },
  { name: "Indiana Ave", type: "prop", color: "#e02020" },
  { name: "Illinois Ave", type: "prop", color: "#e02020" },
  { name: "B&O Railroad", type: "railroad", verse: "Hebrews 12:1 — 'Let us run with endurance the race that is set before us.'" },
  { name: "Atlantic Ave", type: "prop", color: "#d4c200" },
  { name: "Ventnor Ave", type: "prop", color: "#d4c200" },
  { name: "Water Works", type: "utility", verse: "John 4:14 — 'The water I give will become a spring welling up to eternal life.'" },
  { name: "Marvin Gardens", type: "prop", color: "#d4c200" },
  { name: "Go to Jail", type: "go-jail", verse: "Romans 3:23 — 'For all have sinned and fall short of the glory of God.'" },
  { name: "Pacific Ave", type: "prop", color: "#228B22" },
  { name: "North Carolina Ave", type: "prop", color: "#228B22" },
  { name: "Community Chest", type: "chest", verse: "Luke 12:33 — 'Sell your possessions and give to the needy. Provide yourselves with moneybags that do not grow old.'" },
  { name: "Pennsylvania Ave", type: "prop", color: "#228B22" },
  { name: "Short Line Railroad", type: "railroad", verse: "Luke 10:37 — 'Go, and do likewise.'" },
  { name: "Chance", type: "chance", verse: "Proverbs 3:5-6 — 'Trust in the Lord with all your heart... and he will make straight your paths.'" },
  { name: "Park Place", type: "prop", color: "#00008B" },
  { name: "Luxury Tax", type: "tax", verse: "Luke 12:15 — 'Take care, and be on your guard against all covetousness.'" },
  { name: "Boardwalk", type: "prop", color: "#00008B" },
];

const propVerses = [
  "Proverbs 19:1 — 'Better is a poor person who walks in integrity than one who is crooked in speech.'",
  "Proverbs 28:6 — 'Better is a poor man who walks in integrity than a rich man who is crooked in his ways.'",
  "Psalm 37:16 — 'Better is the little that the righteous has than the abundance of many wicked.'",
  "Ecclesiastes 5:10 — 'He who loves money will not be satisfied with money.'",
  "1 Timothy 6:6 — 'Godliness with contentment is great gain.'",
  "Proverbs 31:10 — 'An excellent wife who can find? She is far more precious than jewels.'",
  "Romans 13:1 — 'Let every person be subject to the governing authorities.'",
  "Galatians 5:13 — 'You were called to freedom... serve one another through love.'",
  "James 1:17 — 'Every good gift and every perfect gift is from above.'",
  "Proverbs 17:17 — 'A friend loves at all times, and a brother is born for adversity.'",
  "Jeremiah 29:7 — 'Seek the welfare of the city... for in its welfare you will find your welfare.'",
  "Revelation 3:15 — 'I know your works: you are neither cold nor hot.'",
  "Ephesians 5:8 — 'At one time you were darkness, but now you are light in the Lord.'",
  "Romans 8:28 — 'All things work together for good for those who love God.'",
  "Matthew 5:16 — 'Let your light shine before others, so they may see your good works.'",
  "Ecclesiastes 3:1 — 'For everything there is a season, a time for every matter under heaven.'",
  "Genesis 2:15 — 'The Lord God put him in the garden of Eden to work it and keep it.'",
  "Psalm 23:2 — 'He makes me lie down in green pastures; he leads me beside still waters.'",
  "Isaiah 58:12 — 'You shall be called the repairer of the breach, the restorer of streets to dwell in.'",
  "Micah 6:8 — 'Do justice, love kindness, and walk humbly with your God.'",
  "Psalm 27:4 — 'One thing I ask: that I may dwell in the house of the Lord all my days.'",
  "Revelation 21:21 — 'The street of the city was pure gold, like transparent glass.'",
];

let propIdx = 0;
spaces.forEach(s => {
  if (s.type === 'prop' && !s.verse) {
    s.verse = propVerses[propIdx % propVerses.length];
    propIdx++;
  }
});

// Board positions: [spaceIndex, gridRow, gridCol, direction]
// Bottom row (row 12): spaces 0-10, left to right
// Right col (col 11): spaces 11-19, bottom to top
// Top row (row 1): spaces 20-30, right to left
// Left col (col 1): spaces 31-39, top to bottom

const layout = [];
// Bottom row: indices 0..10, row=12, col=1..11
for (let i = 0; i <= 10; i++) layout.push({ idx: i, row: 12, col: i + 1, dir: 'bottom' });
// Right col: indices 11..19, row=11..3, col=11
for (let i = 0; i < 9; i++) layout.push({ idx: 11 + i, row: 11 - i, col: 11, dir: 'right' });
// Top row: indices 20..30, row=1, col=11..1
for (let i = 0; i <= 10; i++) layout.push({ idx: 20 + i, row: 1, col: 11 - i, dir: 'top' });
// Left col: indices 31..39, row=2..10, col=1
for (let i = 0; i < 9; i++) layout.push({ idx: 31 + i, row: 2 + i, col: 1, dir: 'left' });

const board = document.getElementById('board');

layout.forEach(({ idx, row, col, dir }) => {
  const s = spaces[idx];
  const isCorner = s.type === 'corner' || s.type === 'jail-corner' || s.type === 'go-jail';

  const el = document.createElement('div');
  const typeClass = {
    prop: '', tax: 'tax', railroad: 'railroad', utility: 'utility',
    chance: 'chance', chest: 'chest', 'go-jail': 'go-jail',
    'jail-corner': 'jail-corner', corner: 'corner'
  }[s.type] || '';

  el.className = `space ${typeClass} ${isCorner ? 'corner' : dir}`;
  el.style.gridColumn = col;
  el.style.gridRow = row;

  if (s.type === 'prop' && s.color) {
    const bar = document.createElement('div');
    bar.className = 'color-bar';
    bar.style.background = s.color;
    el.appendChild(bar);
  }

  const nm = document.createElement('div');
  nm.className = 'name';
  nm.textContent = s.name;
  el.appendChild(nm);

  const tip = document.createElement('div');
  tip.className = 'tip';
  tip.textContent = s.verse || '';
  el.appendChild(tip);

  board.appendChild(el);
});

// Center cell
const center = document.createElement('div');
center.className = 'center';
board.appendChild(center);
</script>
</body>
</html>
