<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acts Project</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      padding: 2rem 1rem;
    }

    h1 {
      font-family: 'Cinzel', serif;
      color: #111;
      font-size: clamp(1.1rem, 2.5vw, 1.8rem);
      letter-spacing: 0.15em;
      text-align: center;
      margin-bottom: 1.2rem;
      text-transform: uppercase;
    }

    .board-wrap {
      width: min(700px, 97vw);
      aspect-ratio: 1;
    }

    .board {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      grid-template-rows: repeat(10, 1fr);
      border: 2px solid #222;
      gap: 0;
    }

    .space {
      border: 1px solid #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 5.5px;
      font-weight: 400;
      color: #111;
      cursor: default;
      position: relative;
      padding: 2px;
      line-height: 1.25;
      background: #ffffff;
      overflow: visible;
    }

    .space:hover {
      background: #f5f5f5;
      z-index: 50;
    }

    .space .label {
      font-size: 5px;
      line-height: 1.3;
      color: #111;
    }

    .space .arrow {
      font-size: 12px;
      line-height: 1;
      margin-bottom: 1px;
    }

    .arrow-green { color: #228B22; }
    .arrow-red   { color: #cc2222; }
    .arrow-blue  { color: #1a4aaa; }

    .no-action { font-size: 13px; color: #cc2222; }

    .start-space { font-weight: 700; }

    .center {
      grid-column: 2 / 10;
      grid-row: 2 / 10;
      background: #ffffff;
      border: 1px solid #333;
    }

    .tip {
      display: none;
      position: absolute;
      background: #fffef8;
      border: 1.5px solid #999;
      border-radius: 4px;
      padding: 7px 9px;
      font-family: 'IM Fell English', serif;
      font-size: 11px;
      color: #111;
      line-height: 1.55;
      width: 180px;
      z-index: 300;
      pointer-events: none;
      white-space: normal;
      box-shadow: 1px 3px 8px rgba(0,0,0,0.12);
    }
    .space:hover .tip { display: block; }

    .tip-up    { bottom: 100%; left: 50%; transform: translateX(-50%); margin-bottom: 4px; }
    .tip-down  { top: 100%;   left: 50%; transform: translateX(-50%); margin-top: 4px; }
    .tip-right { left: 100%;  top: 50%;  transform: translateY(-50%); margin-left: 4px; }
    .tip-left  { right: 100%; top: 50%;  transform: translateY(-50%); margin-right: 4px; }

    footer {
      margin-top: 1.2rem;
      font-family: 'IM Fell English', serif;
      font-style: italic;
      color: #888;
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>Acts Project</h1>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<footer>Hover over any space to reveal its Bible verse</footer>

<script>
const spaces = [
  /* ── BOTTOM ROW col 1→10, row 10 ── */
  { col:1,  row:10, label:"START\n15$",                    arrow:"↑", ac:"green", verse:"Genesis 12:1 — 'Go from your country and your kindred to the land I will show you.'" },
  { col:2,  row:10, label:"Teleport\nto Queen",            arrow:"→", ac:"red",   verse:"Acts 8:26 — 'Rise and go toward the south to the road that goes down from Jerusalem to Gaza.'" },
  { col:3,  row:10, label:"Move 5 blocks\nbackwards",      arrow:"→", ac:"red",   verse:"Numbers 14:25 — 'Tomorrow turn and journey into the wilderness.'" },
  { col:4,  row:10, label:"Draw a\nGold Card",             arrow:"→", ac:"red",   verse:"Proverbs 2:4 — 'If you seek it like silver and search for it as for hidden treasures.'" },
  { col:5,  row:10, label:"P.S.S",                         arrow:"→", ac:"red",   verse:"Philippians 4:19 — 'My God will supply every need of yours according to his riches in glory.'" },
  { col:6,  row:10, label:"Move 2 blocks\nbackwards",      arrow:"→", ac:"red",   verse:"Jonah 1:3 — 'Jonah rose to flee to Tarshish from the presence of the Lord.'" },
  { col:7,  row:10, label:"Draw a\nContingency Card",      arrow:"→", ac:"red",   verse:"Esther 4:14 — 'Who knows whether you have not come to the kingdom for such a time as this?'" },
  { col:8,  row:10, label:"Move 5 blocks\nforward",        arrow:"→", ac:"green", verse:"Isaiah 40:31 — 'They shall run and not be weary; they shall walk and not faint.'" },
  { col:9,  row:10, label:"Nothing",                       arrow:"⊘", ac:"red",   verse:"Ecclesiastes 1:2 — 'Vanity of vanities, all is vanity, says the Preacher.'" },
  { col:10, row:10, label:"Draw a\nContingency Card",      arrow:"→", ac:"red",   verse:"Proverbs 16:33 — 'The lot is cast into the lap, but its every decision is from the Lord.'" },

  /* ── RIGHT COL row 9→2, col 10 ── */
  { col:10, row:9,  label:"Total space card\nto move card",arrow:"↓", ac:"red",   verse:"Psalm 37:23 — 'The steps of a man are established by the Lord, when he delights in his way.'" },
  { col:10, row:8,  label:"Draw a\nforth card",            arrow:"↓", ac:"red",   verse:"Joshua 1:9 — 'Be strong and courageous. Do not be frightened or dismayed.'" },
  { col:10, row:7,  label:"Move forward\n2 blocks",        arrow:"↓", ac:"green", verse:"Romans 8:28 — 'All things work together for good for those who love God.'" },
  { col:10, row:6,  label:"Teleport\nto place",            arrow:"↓", ac:"red",   verse:"Acts 8:39 — 'The Spirit of the Lord carried Philip away to another place.'" },
  { col:10, row:5,  label:"Nothing",                       arrow:"⊘", ac:"red",   verse:"Revelation 3:15 — 'I know your works: you are neither cold nor hot.'" },
  { col:10, row:4,  label:"Move\nahead 3",                 arrow:"↓", ac:"green", verse:"Philippians 3:14 — 'I press on toward the goal for the prize of the upward call of God.'" },
  { col:10, row:3,  label:"Nothing\ngoing",                arrow:"↓", ac:"red",   verse:"Proverbs 19:21 — 'Many are the plans in a person's heart, but it is the Lord's purpose that prevails.'" },
  { col:10, row:2,  label:"Draw a\nNothing card",          arrow:"↓", ac:"red",   verse:"James 4:14 — 'You do not know what tomorrow will bring.'" },

  /* ── TOP ROW col 10→1, row 1 ── */
  { col:10, row:1,  label:"Draw a\nforth card",            arrow:"←", ac:"red",   verse:"Hebrews 11:8 — 'By faith Abraham obeyed when he was called to go out to a place he was to receive.'" },
  { col:9,  row:1,  label:"Nothing\nAction card",          arrow:"⊘", ac:"red",   verse:"Ecclesiastes 3:1 — 'For everything there is a season, a time for every matter under heaven.'" },
  { col:8,  row:1,  label:"Move ahead\n2 blocks forward",  arrow:"←", ac:"green", verse:"2 Timothy 4:7 — 'I have fought the good fight, I have finished the race, I have kept the faith.'" },
  { col:7,  row:1,  label:"Nothing",                       arrow:"⊘", ac:"red",   verse:"Matthew 6:34 — 'Do not be anxious about tomorrow, for tomorrow will be anxious for itself.'" },
  { col:6,  row:1,  label:"Move forward\n2 blocks",        arrow:"←", ac:"green", verse:"1 Corinthians 9:24 — 'Run that you may obtain the prize.'" },
  { col:5,  row:1,  label:"Move 2 blocks\nbackwards",      arrow:"←", ac:"red",   verse:"Numbers 14:4 — 'Let us choose a leader and go back to Egypt.'" },
  { col:4,  row:1,  label:"Pass backward\n5 blocks",       arrow:"←", ac:"red",   verse:"Judges 2:19 — 'They turned back and were more corrupt than their fathers.'" },
  { col:3,  row:1,  label:"Move 3 blocks\nbackward",       arrow:"←", ac:"red",   verse:"1 Kings 19:3 — 'He arose and ran for his life.'" },
  { col:2,  row:1,  label:"Pass forward\n2 blocks",        arrow:"←", ac:"green", verse:"Luke 19:4 — 'He ran on ahead and climbed up into a sycamore tree to see Jesus.'" },
  { col:1,  row:1,  label:"JAIL",                          arrow:"",  ac:"",      verse:"Acts 16:26 — 'Suddenly there was a great earthquake, and the prison doors were opened.'" },

  /* ── LEFT COL row 2→9, col 1 ── */
  { col:1,  row:2,  label:"Draw a\nGreen card",            arrow:"↓", ac:"green", verse:"Psalm 23:2 — 'He makes me lie down in green pastures; he leads me beside still waters.'" },
  { col:1,  row:3,  label:"Nothing",                       arrow:"⊘", ac:"red",   verse:"Ecclesiastes 5:10 — 'He who loves money will not be satisfied with money.'" },
  { col:1,  row:4,  label:"Move 1 block\nforward",         arrow:"↓", ac:"green", verse:"Proverbs 4:18 — 'The path of the righteous is like the light of dawn.'" },
  { col:1,  row:5,  label:"Nothing",                       arrow:"⊘", ac:"red",   verse:"1 Timothy 6:6 — 'Godliness with contentment is great gain.'" },
  { col:1,  row:6,  label:"Move 1 back",                   arrow:"↓", ac:"red",   verse:"Jeremiah 7:24 — 'They went backward and not forward.'" },
  { col:1,  row:7,  label:"Move backwards\n2 blocks",      arrow:"↓", ac:"red",   verse:"Hosea 11:7 — 'My people are bent on turning away from me.'" },
  { col:1,  row:8,  label:"Nothing",                       arrow:"⊘", ac:"red",   verse:"Luke 12:15 — 'Take care, and be on guard against all covetousness.'" },
  { col:1,  row:9,  label:"Move forward\n1 block",         arrow:"↑", ac:"green", verse:"Micah 6:8 — 'Do justice, love kindness, and walk humbly with your God.'" },
];

const board = document.getElementById('board');

spaces.forEach(s => {
  const el = document.createElement('div');
  el.className = 'space';
  if (s.label.startsWith('START')) el.classList.add('start-space');
  el.style.gridColumn = s.col;
  el.style.gridRow    = s.row;

  if (s.arrow === '⊘') {
    const a = document.createElement('div');
    a.className = 'no-action';
    a.textContent = '⊘';
    el.appendChild(a);
  } else if (s.arrow) {
    const a = document.createElement('div');
    a.className = `arrow arrow-${s.ac}`;
    a.textContent = s.arrow;
    el.appendChild(a);
  }

  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.style.whiteSpace = 'pre-line';
  lbl.textContent = s.label;
  el.appendChild(lbl);

  const tip = document.createElement('div');
  let tipDir = 'tip-up';
  if (s.row === 10) tipDir = 'tip-up';
  else if (s.row === 1) tipDir = 'tip-down';
  else if (s.col === 10) tipDir = 'tip-left';
  else if (s.col === 1) tipDir = 'tip-right';
  tip.className = `tip ${tipDir}`;
  tip.textContent = s.verse;
  el.appendChild(tip);

  board.appendChild(el);
});

const center = document.createElement('div');
center.className = 'center';
board.appendChild(center);
</script>
</body>
</html>
